name: Qualidade

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar projeto
        run: npm install --ignore-scripts
      - name: Executar testes
        run: npm test
      - name: Validar sintaxe
        run: find src public scripts tests -name '*.js' -print0 | xargs -0 -n1 node --check
